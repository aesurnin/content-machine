name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend:latest
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: backend
            context: ./apps/backend
            file: ./apps/backend/Dockerfile
          - app: frontend
            context: ./apps/frontend
            file: ./apps/frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_BACKEND: ${{ env.IMAGE_BACKEND }}
          IMAGE_FRONTEND: ${{ env.IMAGE_FRONTEND }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,DEPLOY_PATH,IMAGE_BACKEND,IMAGE_FRONTEND
          debug: true
          script_stop: true
          script: |
            set -ex
            echo "=== Deploy start ==="
            DEPLOY_DIR="${DEPLOY_PATH:-/root/online-game-commenter}"
            echo "DEPLOY_DIR=$DEPLOY_DIR"
            cd "$DEPLOY_DIR" || { echo "cd failed"; exit 1; }
            echo "=== Git pull ==="
            git fetch origin main && git reset --hard origin/main
            echo "=== Docker login ==="
            if [ -n "${GHCR_TOKEN}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            fi
            echo "IMAGE_BACKEND=$IMAGE_BACKEND IMAGE_FRONTEND=$IMAGE_FRONTEND"
            export IMAGE_BACKEND IMAGE_FRONTEND
            echo "=== Docker pull ==="
            docker compose -f docker-compose.prod.yml pull
            echo "=== Docker up ==="
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            echo "=== Deploy done ==="
