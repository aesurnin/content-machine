# Production deployment: Backend, Frontend, Postgres, Redis, Traefik
# No screencast-worker.
# Local:  docker compose -f docker-compose.prod.yml up -d (builds images)
# Server: IMAGE_BACKEND=ghcr.io/... IMAGE_FRONTEND=ghcr.io/... docker compose pull && up -d
# Uses same project name & postgres_data volume as docker-compose.yml — data is shared
name: online-game-commenter

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-videoplatform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app

  db-migrate:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.migrate
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-videoplatform}
    depends_on:
      - postgres
    networks:
      - app
    profiles:
      - init

  backend:
    image: ${IMAGE_BACKEND:-online-game-commenter-backend:local}
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
      - apps/backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - COOKIE_SECURE=false
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-videoplatform}
      - REDIS_URL=redis://redis:6379
    networks:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.priority=100"
      - "traefik.http.routers.backend.middlewares=apistrip"
      - "traefik.http.middlewares.apistrip.stripprefix.prefixes=/api"
      - "traefik.http.services.backend.loadbalancer.server.port=3001"

  frontend:
    image: ${IMAGE_FRONTEND:-online-game-commenter-frontend:local}
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: always
    networks:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  traefik:
    image: traefik:v3.6
    restart: always
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=120s"
      - "--entrypoints.web.transport.respondingTimeouts.writeTimeout=120s"
    ports:
      - "${PORT_HTTP:-80}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - backend
      - frontend
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
